name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Macheim ${{ github.ref_name }}'
          releaseBody: |
            ## Macheim ${{ github.ref_name }}

            Valheim Mod Manager for macOS.

            ### Installation
            1. Download the `.dmg` file for your Mac
            2. Open and drag **Macheim** to Applications
            3. If blocked by Gatekeeper: System Settings → Privacy & Security → Open Anyway

            **Apple Silicon (M1/M2/M3/M4):** Download `aarch64.dmg`
            **Intel Mac:** Download `x86_64.dmg`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
